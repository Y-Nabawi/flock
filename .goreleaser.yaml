version: 2
project_name: flock

before:
  hooks:
    - go mod tidy

builds:
  - id: flock
    main: ./cmd/flock
    binary: flock
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default
    name_template: 'flock-{{ .Os }}-{{ .Arch }}'
    files:
      - LICENSE
      - README.md
      - ARCHITECTURE.md
      - SECURITY.md
      - catalog/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot'

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: hadihonarvar
    name: flock
  draft: false
  prerelease: auto
  header: |
    ## Install

    ```bash
    curl -fsSL https://raw.githubusercontent.com/hadihonarvar/flock/main/installer/install.sh | sh
    ```

    More options (specific version, custom install dir, join an existing cluster) — see [QUICKSTART.md](https://github.com/hadihonarvar/flock/blob/main/QUICKSTART.md).

    ## Upgrading

    Already running an earlier version? Just run:

    ```bash
    flock update
    ```

    ## Links

    - Website: [flockllm.com](https://flockllm.com)
    - Maintainer: [Hadi Honarvar Nazari](https://www.linkedin.com/in/hadi-honarvar-nazari/) — `hadi.work.ca@gmail.com`

